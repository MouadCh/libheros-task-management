name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://libheros:libheros@localhost:5432/libheros?schema=public
  HUSKY: '0'

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Check formatting
        run: bun run format:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Lint
        run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Typecheck
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Unit tests
        run: bun run test

  test-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: libheros
          POSTGRES_PASSWORD: libheros
          POSTGRES_DB: libheros
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U libheros -d libheros"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: E2E tests
        run: bun run test:e2e
        env:
          NODE_ENV: test
          APP_HOST: localhost
          API_PORT: 3001
          WEB_PORT: 3000
          DATABASE_URL: postgresql://libheros:libheros@localhost:5432/libheros?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-32chars-min
          JWT_REFRESH_SECRET: ci-refresh-secret-32chars-min

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Build
        run: bun run build
