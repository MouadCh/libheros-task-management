services:
  postgres:
    image: postgres:16-alpine
    container_name: libheros-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-libheros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-libheros}
      POSTGRES_DB: ${POSTGRES_DB:-libheros}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-libheros} -d ${POSTGRES_DB:-libheros}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: libheros-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-3001}:3001'
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      APP_HOST: localhost
      API_PORT: 3001
      WEB_PORT: ${WEB_PORT:-3000}
      # Prefer URL-safe POSTGRES_* values; Compose substitutes them into DATABASE_URL.
      DATABASE_URL: postgresql://${POSTGRES_USER:-libheros}:${POSTGRES_PASSWORD:-libheros}@postgres:5432/${POSTGRES_DB:-libheros}?schema=public
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-32chars}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-32chars}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://127.0.0.1:3001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api}
        NUXT_PUBLIC_WS_URL: ${NUXT_PUBLIC_WS_URL:-http://localhost:3001}
    container_name: libheros-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
