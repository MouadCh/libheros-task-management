services:
  postgres:
    image: postgres:16-alpine
    container_name: libheros-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-libheros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-libheros}
      POSTGRES_DB: ${POSTGRES_DB:-libheros}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-libheros} -d ${POSTGRES_DB:-libheros}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
